<div class="card h-100 shadow ">
  
  <div class="card-header fw-bold">
    {{ bikeObj.brand }} - {{ bikeObj.model }}
  </div>

  <div class="card-body">
    <p><strong>Price:</strong> ₹{{ bikeObj.price }}</p>
    <p><strong>Color:</strong> {{ bikeObj.color }}</p>
    <p><strong>Mileage:</strong> {{ bikeObj.mileage }}</p>
  </div>

  <div class="card-footer text-center">
    <button class="btn btn-sm btn-primary">View Details</button>
  </div>

</div>
